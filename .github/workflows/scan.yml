name: Job Board Scan

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:       # manual trigger for testing
    inputs:
      unlimited:
        description: 'Backfill run: lift the per-run notify cap (post everything fresh)'
        type: boolean
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore dedup DB
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-v3-${{ github.run_id }}
          restore-keys: |
            jobs-db-v3-

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sidecar dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Run scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BOT_NAME: Papa Omega Phi
          BOT_AVATAR_URL: ${{ secrets.BOT_AVATAR_URL }}
          FIELD_WEBHOOK_FINANCE: ${{ secrets.FIELD_WEBHOOK_FINANCE }}
          FIELD_WEBHOOK_CONSULTING: ${{ secrets.FIELD_WEBHOOK_CONSULTING }}
          FIELD_WEBHOOK_MARKETING_SALES: ${{ secrets.FIELD_WEBHOOK_MARKETING_SALES }}
          FIELD_WEBHOOK_TECH_DATA: ${{ secrets.FIELD_WEBHOOK_TECH_DATA }}
          FIELD_WEBHOOK_OPS_HR: ${{ secrets.FIELD_WEBHOOK_OPS_HR }}
          FIELD_WEBHOOK_FELLOWSHIPS: ${{ secrets.FIELD_WEBHOOK_FELLOWSHIPS }}
          OPENROUTER_JOB_SCRAPER: ${{ secrets.OPENROUTER_JOB_SCRAPER }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JOBSPY_PYTHON: python3
          JOBSPY_PROXIES: ${{ secrets.JOBSPY_PROXIES }}
          MAX_JOB_AGE_DAYS: '7'
          # Backfill runs (workflow_dispatch with unlimited=true) lift the cap so
          # every fresh job posts in one pass; scheduled runs keep the 40 cap.
          MAX_NOTIFY_PER_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.unlimited) && '0' || '40' }}
        run: node scan.mjs --notify

# job-scraper internship bot — AKPSI
