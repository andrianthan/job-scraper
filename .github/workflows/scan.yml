name: Job Board Scan

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours
  workflow_dispatch:       # manual trigger for testing
    inputs:
      unlimited:
        description: 'Backfill run: lift the per-run notify cap (post everything fresh)'
        type: boolean
        default: false

concurrency:
  group: job-scan-csv
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      JOBS_DATA_REPO: andrianthan/jobs-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore dedup DB
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-v3
          restore-keys: |
            jobs-db-v3-

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sidecar/requirements.txt

      - name: Install sidecar dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Run scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS_WEBHOOK_URL: ${{ secrets.STATUS_WEBHOOK_URL }}
          BOT_NAME: Papa Omega Phi
          BOT_AVATAR_URL: ${{ secrets.BOT_AVATAR_URL }}
          FIELD_WEBHOOK_FINANCE: ${{ secrets.FIELD_WEBHOOK_FINANCE }}
          FIELD_WEBHOOK_CONSULTING: ${{ secrets.FIELD_WEBHOOK_CONSULTING }}
          FIELD_WEBHOOK_MARKETING_SALES: ${{ secrets.FIELD_WEBHOOK_MARKETING_SALES }}
          FIELD_WEBHOOK_TECH_DATA: ${{ secrets.FIELD_WEBHOOK_TECH_DATA }}
          FIELD_WEBHOOK_OPS_HR: ${{ secrets.FIELD_WEBHOOK_OPS_HR }}
          FIELD_WEBHOOK_FELLOWSHIPS: ${{ secrets.FIELD_WEBHOOK_FELLOWSHIPS }}
          OPENROUTER_JOB_SCRAPER: ${{ secrets.OPENROUTER_JOB_SCRAPER }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JOBSPY_PYTHON: python3
          JOBSPY_PROXIES: ${{ secrets.JOBSPY_PROXIES }}
          MAX_JOB_AGE_DAYS: '7'
          # Backfill runs (workflow_dispatch with unlimited=true) lift the cap so
          # every fresh job posts in one pass; scheduled runs keep the 40 cap.
          MAX_NOTIFY_PER_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.unlimited == 'true') && '0' || '40' }}
          SCAN_INTERVAL_HOURS: '4'
        run: node scan.mjs --notify

      - name: Capture scan output as JSON
        if: always()
        run: node scan.mjs --json > /tmp/scan-jobs.json 2>/dev/null || echo "[]" > /tmp/scan-jobs.json
        # The `|| echo "[]"` handles scan failures (network, etc.) so the CSV
        # push step still runs and the workflow doesn't dead-letter. The CSV
        # push with empty jobs list will skip on no-diff.

      - name: Checkout jobs-data repo
        if: always()
        uses: actions/checkout@v4
        with:
          repository: ${{ env.JOBS_DATA_REPO }}
          path: jobs-data
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: false

      - name: Run CSV push helper
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          JOBS_DATA_REPO: ${{ env.JOBS_DATA_REPO }}
          CSV_PATH: ${{ github.workspace }}/jobs-data/jobs.csv
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/push-csv.mjs /tmp/scan-jobs.json

# job-scraper internship bot — AKPSI
# Phase 7: appends CSV to andrianthan/jobs-data on each scan run