name: Job Board Scan

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:       # manual trigger for testing

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore dedup DB
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-v2-${{ github.run_id }}
          restore-keys: |
            jobs-db-v2-

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BOT_NAME: Keystone
          BOT_AVATAR_URL: ${{ secrets.BOT_AVATAR_URL }}
          FIELD_WEBHOOK_FINANCE: ${{ secrets.FIELD_WEBHOOK_FINANCE }}
          FIELD_WEBHOOK_CONSULTING: ${{ secrets.FIELD_WEBHOOK_CONSULTING }}
          FIELD_WEBHOOK_MARKETING_SALES: ${{ secrets.FIELD_WEBHOOK_MARKETING_SALES }}
          FIELD_WEBHOOK_TECH_DATA: ${{ secrets.FIELD_WEBHOOK_TECH_DATA }}
          FIELD_WEBHOOK_OPS_HR: ${{ secrets.FIELD_WEBHOOK_OPS_HR }}
          FIELD_WEBHOOK_FELLOWSHIPS: ${{ secrets.FIELD_WEBHOOK_FELLOWSHIPS }}
          OPENROUTER_JOB_SCRAPER: ${{ secrets.OPENROUTER_JOB_SCRAPER }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scan.mjs --notify

# job-scraper internship bot — AKPSI
